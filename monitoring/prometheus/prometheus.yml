global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Kafka consumer-group lag, broker and topic metrics.
  - job_name: kafka
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Flink JVM (CPU/memory) and per-operator record throughput. The
  # PrometheusReporter serves metrics on 9249 in each Flink container.
  - job_name: flink-jobmanager
    static_configs:
      - targets: ['flink-jobmanager:9249']
        labels:
          role: jobmanager

  # TaskManagers run as multiple replicas sharing one service name, so use DNS
  # A-record discovery to scrape every replica (a static target catches only one).
  - job_name: flink-taskmanager
    dns_sd_configs:
      - names: ['flink-taskmanager']
        type: A
        port: 9249
    relabel_configs:
      - target_label: role
        replacement: taskmanager

  # Per-container CPU / memory / disk from cAdvisor.
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
