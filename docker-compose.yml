x-flink-common: &flink-common
  build: ./flink_streaming
  volumes:
    - ./flink_streaming/jobs:/opt/flink/jobs
  networks:
    - my-network

# Apache Kafka 4.x runs KRaft-only (no Zookeeper). Shared image + common env
# for the 3-node cluster; each broker overrides node id / listeners below.
x-kafka-common: &kafka-common
  image: apache/kafka:4.0.0
  networks:
    - my-network

x-kafka-env: &kafka-env
  KAFKA_PROCESS_ROLES: 'broker,controller'
  KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker-1:29093,2@broker-2:29093,3@broker-3:29093'
  KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
  KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
  # 3 nodes → replication factor 3, min ISR 2 for the internal topics
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  # Fixed cluster id so every node formats the same KRaft metadata log
  CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

x-airflow-common: &airflow-common
  image: apache/airflow:3.0.3
  volumes:
    # - ./airflow/dags:/opt/airflow/dags
    # - ./airflow/logs:/opt/airflow/logs
    # - ./airflow/jobs:/opt/airflow/jobs
    # must create file and gain permission for docker 
    # - ./airflow/simple_auth_manager_passwords.json.generated:/opt/airflow/simple_auth_manager_passwords.json.generated
    - ./airflow:/opt/airflow
    - /var/run/docker.sock:/var/run/docker.sock

  env_file:
    - airflow.env
  depends_on:
    - postgres
  networks:
    - my-network

services:
  broker-1:
    <<: *kafka-common
    hostname: broker-1
    container_name: broker-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:29092,PLAINTEXT_HOST://localhost:9092'

  broker-2:
    <<: *kafka-common
    hostname: broker-2
    container_name: broker-2
    ports:
      - "9094:9094"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:29092,PLAINTEXT_HOST://localhost:9094'

  broker-3:
    <<: *kafka-common
    hostname: broker-3
    container_name: broker-3
    ports:
      - "9095:9095"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9095'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-3:29092,PLAINTEXT_HOST://localhost:9095'

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'broker-1:29092,broker-2:29092,broker-3:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - my-network

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.5.0
    hostname: control-center
    container_name: control-center
    depends_on:
      - broker-1
      - broker-2
      - broker-3
      - schema-registry
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'broker-1:29092,broker-2:29092,broker-3:29092'
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONTROL_CENTER_REPLICATION_FACTOR: 3
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 3
      CONFLUENT_METRICS_ENABLE: 'false'
      PORT: 9021
    networks:
      - my-network

  flink-jobmanager:
    <<: *flink-common
    hostname: flink-jobmanager
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8083:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081

  flink-taskmanager:
    <<: *flink-common
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    deploy:
      replicas: 1
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m

  # Submit the PyFlink job:
  # docker exec -it flink-jobmanager flink run -py /opt/flink/jobs/stream_events.py

  postgres:
    image: postgres:14.18
    ports:
      - 5000:5432
    environment:
      POSTGRES_DB: airflow_db
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - my-network

  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow scheduler"

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - 8000:8080
    depends_on:
      - airflow-scheduler

  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor
    depends_on:
      - airflow-scheduler

networks:
  my-network:
