services:
  broker-1:
    <<: *kafka-common
    hostname: broker-1
    container_name: broker-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:29092,PLAINTEXT_HOST://localhost:9092'

  broker-2:
    <<: *kafka-common
    hostname: broker-2
    container_name: broker-2
    ports:
      - "9094:9094"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:29092,PLAINTEXT_HOST://localhost:9094'

  broker-3:
    <<: *kafka-common
    hostname: broker-3
    container_name: broker-3
    ports:
      - "9095:9095"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9095'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-3:29092,PLAINTEXT_HOST://localhost:9095'

  # Creates the event topics with 3 partitions (replication-factor 3) before any
  # producer runs, so partitioning isn't left to broker auto-create defaults.
  # Runs to completion, then exits.
  kafka-init:
    <<: *kafka-common
    container_name: kafka-init
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to accept requests..."
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker-1:29092 --list >/dev/null 2>&1; do sleep 3; done
        for t in listen_events page_view_events auth_events; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker-1:29092 \
            --create --if-not-exists --topic "$$t" --partitions 3 --replication-factor 3
          # If the topic already existed with fewer partitions, grow it to 3.
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker-1:29092 \
            --alter --topic "$$t" --partitions 3 2>/dev/null || true
        done
        echo "Topics ready (3 partitions each):"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker-1:29092 --describe | grep -E 'Topic:|PartitionCount'

  # Event generator. Auto-runs on `compose up` after the topics exist. Uses the
  # container's (GNU) date to set start = now and end = now + 24h.
  eventsim:
    build: ./eventsim
    image: eventsim:latest
    container_name: eventsim
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: on-failure
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        START=$$(date -u +"%Y-%m-%dT%H:%M:%S")
        END=$$(date -u -d "+24 hours" +"%Y-%m-%dT%H:%M:%S")
        echo "Running eventsim with start=$$START end=$$END"
        exec /opt/eventsim/eventsim.sh \
          -c examples/example-config.json \
          --continuous \
          --start-time "$$START" \
          --end-time "$$END" \
          --nusers 1000000 \
          --growth-rate 10 \
          --userid 1 \
          --kafkaBrokerList broker-1:29092,broker-2:29092,broker-3:29092
    networks:
      - my-network

  flink-jobmanager:
    <<: *flink-common
    hostname: flink-jobmanager
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8083:8081"
      - "9249:9249"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.port: 8081
        cluster.evenly-spread-out-slots: true
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249

  flink-taskmanager:
    <<: *flink-common
    command: taskmanager
    depends_on:
      - flink-jobmanager
    deploy:
      replicas: 3
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 1728m
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249

  # One-shot job submitter: waits for a free task slot, then submits the
  # PyFlink job detached so it survives after this container exits. Skips if a
  # job is already RUNNING (avoids duplicates on repeated `compose up`).
  flink-job-submitter:
    <<: *flink-common
    container_name: flink-job-submitter
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
      - eventsim
    restart: "no"
    environment:
      FLINK_DETACHED: "true"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        JM=http://flink-jobmanager:8081
        echo "Waiting for JobManager and >=3 free task slots (parallelism 3)..."
        while true; do
          SLOTS=$$(wget -qO- "$$JM/overview" 2>/dev/null | sed -n 's/.*"slots-available":\([0-9]*\).*/\1/p')
          [ "$${SLOTS:-0}" -ge 3 ] 2>/dev/null && break
          sleep 3
        done
        if wget -qO- "$$JM/jobs/overview" 2>/dev/null | grep -q '"state":"RUNNING"'; then
          echo "A Flink job is already RUNNING; skipping submit."
          exit 0
        fi
        echo "Submitting stream_events.py (detached)..."
        flink run -d -m flink-jobmanager:8081 -py /opt/flink/jobs/stream_events.py
        echo "Job submitted."

  # Manual alternative:
  # docker exec -it flink-jobmanager flink run -py /opt/flink/jobs/stream_events.py

