  # --- Monitoring stack -------------------------------------------------------

  # Exposes Kafka consumer-group lag (and broker/topic metrics) to Prometheus
  # on :9308. Talks to the KRaft brokers over the internal listener.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    hostname: kafka-exporter
    container_name: kafka-exporter
    restart: on-failure
    command:
      - '--kafka.server=broker-1:29092'
      - '--kafka.server=broker-2:29092'
      - '--kafka.server=broker-3:29092'
    ports:
      - "9308:9308"
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    networks:
      - my-network

  # Per-container CPU / memory / disk (filesystem + I/O) metrics on :8080,
  # covering the Flink job/task managers and everything else in the stack.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    hostname: cadvisor
    container_name: cadvisor
    privileged: true
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - my-network

  prometheus:
    image: prom/prometheus:v2.54.1
    hostname: prometheus
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - kafka-exporter
      - cadvisor
      - flink-jobmanager
    networks:
      - my-network

  grafana:
    image: grafana/grafana:11.2.0
    hostname: grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - my-network

networks:
  my-network:

volumes:
  prometheus-data:
  grafana-data:
