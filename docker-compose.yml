x-flink-common: &flink-common
  build: ./flink_streaming
  volumes:
    - ./flink_streaming/jobs:/opt/flink/jobs
  networks:
    - my-network

# Apache Kafka 4.x runs KRaft-only (no Zookeeper). Shared image + common env
# for the 3-node cluster; each broker overrides node id / listeners below.
x-kafka-common: &kafka-common
  image: apache/kafka:4.3.0
  networks:
    - my-network

x-kafka-env: &kafka-env
  KAFKA_PROCESS_ROLES: 'broker,controller'
  KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker-1:29093,2@broker-2:29093,3@broker-3:29093'
  KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
  KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
  # 3 nodes → replication factor 3, min ISR 2 for the internal topics
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  # Fixed cluster id so every node formats the same KRaft metadata log
  CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

# x-airflow-common: &airflow-common
#   image: apache/airflow:3.0.3
